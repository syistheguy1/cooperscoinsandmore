<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooper's Coins & Art</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* MENU */

.menu{
background:rgba(0,0,0,0.75);
padding:15px;
position:sticky;
top:0;
}

.menu a{
color:white;
margin:15px;
font-size:20px;
text-decoration:none;
font-weight:bold;
}

.menu a:hover{
color:gold;
}

/* LOGO */

.logo{
width:260px;
margin-top:30px;
filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.7));
}

/* CONTENT BOX */

.box{
background:rgba(0,0,0,0.65);
padding:30px;
margin:40px auto;
width:80%;
max-width:900px;
border-radius:12px;
}

/* BUTTON */

.mainBtn{
background:gold;
border:none;
padding:14px 28px;
font-size:18px;
cursor:pointer;
border-radius:8px;
margin-top:20px;
}

.mainBtn:hover{
background:#ffd700;
}

/* MOBILE */

@media (max-width:700px){

.menu a{
display:block;
margin:10px;
}

.logo{
width:200px;
}

}

</style>
</head>

<body>

<div class="menu">
<a href="index.html">Home</a>
<a href="collection.html">My Collection</a>
<a href="contact.html">Order / Contact</a>
</div>

<img class="logo" src="logo.png" alt="Cooper's Coins and Art Logo">

<div class="box">

<h1>Welcome to Cooper's Coins & Art</h1>

<p>
A young collector sharing coins, creativity, and original artwork.
</p>

<a href="collection.html">
<button class="mainBtn">View My Coin Collection</button>
</a>

<p style="margin-top:20px;">
New coins and artwork added regularly!
</p>

</div>

</body>
</html>
