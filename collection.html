<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooper's Coin Collection</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background-image:url("background.jpg");
background-size:cover;
color:white;
text-align:center;
margin:0;
}

.menu{
background:rgba(0,0,0,0.75);
padding:15px;
}

.menu a{
color:white;
margin:15px;
font-size:20px;
text-decoration:none;
font-weight:bold;
}

.menu a:hover{
color:gold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
}

.gallery img{
width:100%;
border:4px solid gold;
border-radius:10px;
}

</style>

</head>

<body>

<div class="menu">
<a href="index.html">Home</a>
<a href="collection.html">My Collection</a>
<a href="contact.html">Contact Cooper</a>
</div>

<h1>My Coin Collection</h1>

<div class="gallery" id="gallery"></div>

<script>

const images = [
"hello.jpg",
"vingt-dollars.jpg"
];

const gallery = document.getElementById("gallery");

images.forEach(img => {

const image = document.createElement("img");
image.src = "images/coins/" + img;

gallery.appendChild(image);

});

</script>

</body>
</html>
