<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooper's Coin Collection</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background-image:url("background.jpg");
background-size:cover;
color:white;
text-align:center;
margin:0;
}

/* MENU */

.menu{
background:rgba(0,0,0,0.75);
padding:15px;
}

.menu a{
color:white;
margin:15px;
font-size:20px;
text-decoration:none;
font-weight:bold;
}

.menu a:hover{
color:gold;
}

/* TITLE */

h1{
margin-top:30px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:30px;
padding:40px;
}

/* CARD */

.card{
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

.card img{
width:100%;
border:4px solid gold;
border-radius:10px;
}

/* ORDER BUTTON */

.orderBtn{
margin-top:10px;
background:gold;
border:none;
padding:10px 20px;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

.orderBtn:hover{
background:#ffd700;
}

</style>

</head>

<body>

<div class="menu">
<a href="index.html">Home</a>
<a href="collection.html">My Collection</a>
<a href="contact.html">Order / Contact</a>
</div>

<h1>My Coin Collection</h1>

<div class="gallery" id="gallery"></div>

<script src="data/coins.js"></script>

<script>

const gallery = document.getElementById("gallery");

coins.forEach(coin => {

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<img src="images/coins/${coin.image}">
<h3>${coin.name}</h3>
${coin.description ? `<p>${coin.description}</p>` : ""}
<a href="contact.html"><button class="orderBtn">Order / Ask About This</button></a>
`;

gallery.appendChild(card);

});

</script>

</body>
</html>
